<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHRINE | Dashboard</title>
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }
        /* Simple Sidebar */
        .sidebar {
            width: 250px;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .ai-pulse {
            width: 100px;
            height: 100px;
            background: #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 50px #00f2ff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SHRINE</h2>
        <p style="color: #666;">v1.0.0-Alpha</p>
        <hr style="border: 0.5px solid #333;">
        <p>Models</p>
        <p>Neural Links</p>
        <p>Ecosystem</p>
    </div>
    <div class="main-content">
        <div class="ai-pulse"></div>
        <h1 style="margin-top: 30px;">System Online</h1>
        <p style="color: #888;">Initializing multi-model synchronization...</p>
    </div>
</body>
</html>
